# ISC_benchmark/config/dataset_idents.yaml
#
# Cell type annotation columns for each dataset
# Maps dataset identifiers to their available cell type annotation columns
# Used by ISC benchmark pipeline to identify which annotations to test

# ============================================================================
# DATASET IDENT MAPPINGS
# ============================================================================
# Each dataset can have multiple annotation levels (coarse to fine-grained)
# Listed in order from coarse to fine-grained annotations

idents:
  # ========================================================================
  # JoaI (Joanito et al., 2022) - Colorectal Cancer
  # ========================================================================
  JoaI:
    - "cell.type"
    
  # ========================================================================
  # Mitchel (Stephenson et al., 2021) - COVID PBMC
  # ========================================================================
  Stephenson:
    - "OriginalAnnotationLevel1"
    - "OriginalAnnotationLevel2"
  
  # ========================================================================
  # BCC (Ganier & Yerly) - Basal Cell Carcinoma
  # ========================================================================
  BCC:
    - "annotation"
  
  # ========================================================================
  # LungAtlas (Sikkema et al., 2023) - Healthy Lung Tissue
  # ========================================================================
  LungAtlas:
    - "cell_type"
    - "ann_level_3"
    - "ann_level_4"
  
  # ========================================================================
  # ICBAtlas (Gondal et al., 2025) - Immunotherapy Cohort
  # ========================================================================
  ICBAtlas:
    - "cell_type"
  
