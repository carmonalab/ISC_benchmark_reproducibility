# Kept for provenance (original resource parameters)
# Prefer editing `config/benchmark_parameters.yaml`.

reduction: true
sample: sample
ndim: 30
black.list: null
gene.list: null
normalization.method: Log1p
IntVal.metric:
  - silhouette
  - 2label.silhouette
  - NeighborhoodPurity
  - ward.PropMatch
  - Orbital.medoid
  - Average.similarity
dissimilarity.method:
  - WasserStein
  - Pseudobulk:Euclidean
  - Pseudobulk:Cosine
  - Pseudobulk:Pearson
  - BestHit:Match
  - BestHit:Score
min.samples: 5
min.cells: 10
bparam: null
progressbar: false
KNNGraph_k: 5
hclust.method: ward.D2
verbose: true
