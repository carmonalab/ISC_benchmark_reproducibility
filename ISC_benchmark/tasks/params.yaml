# Kept for provenance (original task parameters)
# Prefer editing `config/benchmark_parameters.yaml`.

run:
  missclassify: true
  Nsamples: true
  Nct: true
  NCell: true
  mergeCT: true
  SplitCelltype: true

common:
  reduction: true
  sample: sample
  ndim: 30
  black.list: null
  gene.list: null
  normalization.method: Log1p
  IntVal.metric:
    - silhouette
    - 2label.silhouette
    - NeighborhoodPurity
    - ward.PropMatch
    - Orbital.medoid
    - Average.similarity
  dissimilarity.method:
    - WasserStein
    - Pseudobulk:Euclidean
    - Pseudobulk:Cosine
    - Pseudobulk:Pearson
    - BestHit:Match
    - BestHit:Score
  min.samples: 5
  min.cells: 10
  bparam: null
  progressbar: false
  KNNGraph_k: 5
  hclust.method: ward.D2
  save.plots: true
  verbose: true

wr.missclasify:
  rates: [1, 0.75, 0.5, 0.25, 0]
  replicates: 3
  seed: 22

wr.NSamples:
  rates: [1, 0.9, 0.7, 0.5]
  replicates: 3
  seed: 22

wr.NCell:
  rates: [1, 0.75, 0.5, 0.25]
  ctype: null
  replicates: 3
  seed: 22

wr.Nct:
  down.sample.comb: 30
  seed: 22

wr.mergeCT: []

wr.SplitCelltype:
  rates: [1, 0.5]
  ctype: null
  replicates: 3
  seed: 22
