# Global parameters for reproducible runs

# Reproducibility
seed: 22
ncores: 8

# Data processing
processing:
  max_cells_per_sample_celltype: 200
  min_samples: 9
  max_samples: 15
  min_cells_per_sample: 200
  # If TRUE, will keep only samples that pass min_cells_per_sample and maximise
  # representation of cell types when nsamples > max_samples.
  enforce_optimal_dataset: true

# Label transfer (query/reference split)
label_transfer:
  prop_query_samples: 0.7

# ISC benchmark tasks (ported from Consistency_metrics_benchmark/tasks/params.yaml)
isc_tasks:
  run:
    missclassify: true
    Nsamples: true
    Nct: true
    NCell: true
    mergeCT: true
    SplitCelltype: true
  common:
    reduction: true
    sample: sample
    ndim: 30
    black.list: null
    gene.list: null
    normalization.method: Log1p
    IntVal.metric:
      - silhouette
      - 2label.silhouette
      - NeighborhoodPurity
      - ward.PropMatch
      - Orbital.medoid
      - Average.similarity
    dissimilarity.method:
      - WasserStein
      - Pseudobulk:Euclidean
      - Pseudobulk:Cosine
      - Pseudobulk:Pearson
      - BestHit:Match
      - BestHit:Score
    min.samples: 5
    min.cells: 10
    bparam: null
    progressbar: false
    KNNGraph_k: 5
    hclust.method: ward.D2
    save.plots: true
    verbose: true
  wr.missclasify:
    rates: [1, 0.75, 0.5, 0.25, 0]
    replicates: 3
    seed: 22
  wr.NSamples:
    rates: [1, 0.9, 0.7, 0.5]
    replicates: 3
    seed: 22
  wr.NCell:
    rates: [1, 0.75, 0.5, 0.25]
    ctype: null
    replicates: 3
    seed: 22
  wr.Nct:
    down.sample.comb: 30
    seed: 22
  wr.mergeCT: []
  wr.SplitCelltype:
    rates: [1, 0.5]
    ctype: null
    replicates: 3
    seed: 22

# ISC resource profiling (ported from Consistency_metrics_benchmark/resources/params.yaml)
isc_resources:
  reduction: true
  sample: sample
  ndim: 30
  black.list: null
  gene.list: null
  normalization.method: Log1p
  IntVal.metric:
    - silhouette
    - 2label.silhouette
    - NeighborhoodPurity
    - ward.PropMatch
    - Orbital.medoid
    - Average.similarity
  dissimilarity.method:
    - WasserStein
    - Pseudobulk:Euclidean
    - Pseudobulk:Cosine
    - Pseudobulk:Pearson
    - BestHit:Match
    - BestHit:Score
  min.samples: 5
  min.cells: 10
  bparam: null
  progressbar: false
  KNNGraph_k: 5
  hclust.method: ward.D2
  verbose: true
