# Dataset registry for reproducible downloads + preprocessing
#
# Notes:
# - `record_id` is the Zenodo record ID (preferred) OR a DOI string. If you only
#   have a DOI, populate `doi` and provide direct file URLs under `files`.
# - `files[].url` should be a direct download URL (Zenodo provides these).
# - Column mappings must match the metadata columns in the raw Seurat object.
#
# The repository does not ship datasets. Place downloaded files in:
#   zenodo/raw/<filename>

zenodo:
  # TODO: fill with the public record DOI for the paper datasets
  doi: "10.5281/zenodo.18921437"

datasets:
